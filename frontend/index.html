<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今彩539 排除概率分析 Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0a0e17;
  color: #e0e6f0;
  min-height: 100vh;
}
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 0; border-bottom: 1px solid #1e2a3a;
}
header h1 { font-size: 24px; color: #ffd700; }
header .meta { font-size: 14px; color: #8899aa; }
.card {
  background: #111927; border: 1px solid #1e2a3a; border-radius: 12px;
  padding: 20px; margin: 16px 0;
}
.card-title { font-size: 16px; color: #ffd700; margin-bottom: 12px; font-weight: 600; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

/* 预测区域 */
.prediction-group { margin-bottom: 16px; }
.prediction-label { font-size: 13px; color: #8899aa; margin-bottom: 6px; }
.number-balls { display: flex; gap: 8px; flex-wrap: wrap; }
.ball {
  width: 44px; height: 44px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-size: 16px;
  font-weight: 700; cursor: default;
}
.ball.exclude {
  background: linear-gradient(135deg, #dc3545, #c82333);
  color: white; border: 2px solid #ff4d5e;
}
.ball.recommend {
  background: linear-gradient(135deg, #28a745, #1e7e34);
  color: white; border: 2px solid #34ce57;
}
.ball.highlight {
  box-shadow: 0 0 12px rgba(255,215,0,0.5);
}
.ball .prob {
  font-size: 10px; position: absolute; bottom: -14px;
  color: #8899aa;
}

/* 准确率指标 */
.metric-row { display: flex; gap: 20px; margin-bottom: 8px; }
.metric {
  flex: 1; text-align: center; padding: 12px;
  background: #0d1520; border-radius: 8px;
}
.metric .value { font-size: 28px; font-weight: 700; }
.metric .label { font-size: 12px; color: #8899aa; }
.metric .value.green { color: #28a745; }
.metric .value.gold { color: #ffd700; }
.metric .value.red { color: #dc3545; }

/* 表格 */
table { width: 100%; border-collapse: collapse; margin-top: 8px; }
th, td { padding: 8px 12px; text-align: center; }
th { font-size: 12px; color: #8899aa; background: #0d1520; }
td { font-size: 13px; border-bottom: 1px solid #1e2a3a; }
tr:hover { background: #1a2535; }
.num-cell { font-weight: 700; font-size: 15px; }
.score-cell { color: #ffd700; font-weight: 600; }
.tag-exclude { color: #dc3545; font-size: 11px; }
.tag-recommend { color: #28a745; font-size: 11px; }

/* 图表区域 */
canvas { max-width: 100%; }
.chart-container { position: relative; height: 200px; }

/* 按钮 */
.btn-run {
  background: linear-gradient(135deg, #ffd700, #e6c200);
  color: #0a0e17; border: none; padding: 12px 24px;
  border-radius: 8px; font-size: 14px; font-weight: 700;
  cursor: pointer; margin: 10px 0;
  transition: all 0.3s;
}
.btn-run:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,215,0,0.3); }
.btn-run:active { transform: translateY(0); }

/* 进度条 */
.progress-bar {
  height: 4px; background: #1e2a3a; border-radius: 2px;
  overflow: hidden; margin-top: 4px;
}
.progress-fill {
  height: 100%; background: #ffd700; border-radius: 2px;
  transition: width 1s ease;
}

/* 策略对比 */
.strategy-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid #1e2a3a;
}
.strategy-name { font-weight: 600; }
.strategy-acc { font-size: 16px; font-weight: 700; }
.strategy-delta { font-size: 13px; }
.positive { color: #28a745; }
.negative { color: #dc3545; }

/* 响应式 */
@media (max-width: 768px) {
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .ball { width: 36px; height: 36px; font-size: 14px; }
}

/* 加载动画 */
.loading { display: flex; justify-content: center; padding: 40px; }
.spinner {
  width: 40px; height: 40px; border: 3px solid #1e2a3a;
  border-top-color: #ffd700; border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>✦ 今彩539 排除概率分析</h1>
    <div class="meta">
      <div id="engine-info">引擎 v2.1 · 八维度评分</div>
      <div id="update-time">--</div>
    </div>
  </header>

  <button class="btn-run" onclick="runAnalysis()">▶ 运行预测引擎</button>
  <div class="progress-bar" id="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>

  <!-- 当日预测 -->
  <div class="card">
    <div class="card-title">🎯 当日预测分析结果</div>
    <div class="grid-3">
      <div class="prediction-group">
        <div class="prediction-label">TOP2 排除号（最高不中奖概率）</div>
        <div class="number-balls" id="top2-balls"></div>
      </div>
      <div class="prediction-group">
        <div class="prediction-label">TOP5 排除号</div>
        <div class="number-balls" id="top5-balls"></div>
      </div>
      <div class="prediction-group">
        <div class="prediction-label">TOP10 排除号</div>
        <div class="number-balls" id="top10-balls"></div>
      </div>
    </div>
    <div class="prediction-group" style="margin-top:16px">
      <div class="prediction-label">TOP5 关注号（最可能出现的号码）</div>
      <div class="number-balls" id="recommend-balls"></div>
    </div>
  </div>

  <!-- 准确率指标 -->
  <div class="card">
    <div class="card-title">📊 回测准确率指标</div>
    <div class="metric-row">
      <div class="metric">
        <div class="value gold" id="accuracy-value">--</div>
        <div class="label">引擎准确率</div>
      </div>
      <div class="metric">
        <div class="value" id="baseline-value">87.18%</div>
        <div class="label">随机基线</div>
      </div>
      <div class="metric">
        <div class="value" id="improvement-value">--</div>
        <div class="label">提升幅度</div>
      </div>
      <div class="metric">
        <div class="value" id="perfect-value">--</div>
        <div class="label">完美排除期</div>
      </div>
    </div>
  </div>

  <!-- 月度准确率趋势 -->
  <div class="grid-2">
    <div class="card">
      <div class="card-title">📈 近一年月度准确率变化</div>
      <div class="chart-container">
        <canvas id="monthly-chart"></canvas>
      </div>
    </div>
    <div class="card">
      <div class="card-title">📉 近一个月每日准确率变化</div>
      <div class="chart-container">
        <canvas id="daily-chart"></canvas>
      </div>
    </div>
  </div>

  <!-- 号码评分详情 -->
  <div class="card">
    <div class="card-title">🔢 全号码评分详情（按不中奖概率排序）</div>
    <table>
      <thead>
        <tr>
          <th>号码</th><th>综合评分</th><th>动量</th><th>近期</th><th>聚类</th><th>分类</th>
        </tr>
      </thead>
      <tbody id="scores-table"></tbody>
    </table>
  </div>

  <!-- 策略对比 -->
  <div class="card">
    <div class="card-title">🏆 策略准确率对比</div>
    <div id="strategy-list"></div>
  </div>

  <!-- 最新开奖 -->
  <div class="card">
    <div class="card-title">🎲 最新开奖记录</div>
    <div class="number-balls" id="latest-draw"></div>
    <div class="meta" id="latest-date"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
// 加载Dashboard数据
async function loadData() {
  try {
    const resp = await fetch('dashboard_data.json');
    const data = await resp.json();
    renderDashboard(data);
  } catch(e) {
    document.getElementById('update-time').textContent = '数据加载失败，请运行预测引擎';
  }
}

function renderDashboard(data) {
  // 更新时间
  document.getElementById('update-time').textContent = '更新: ' + data.generated_at.substring(0, 16);
  
  // 预测球
  renderBalls('top2-balls', data.prediction.top2, 'exclude');
  renderBalls('top5-balls', data.prediction.top5, 'exclude');
  renderBalls('top10-balls', data.prediction.top10, 'exclude');
  renderBalls('recommend-balls', data.prediction.recommended, 'recommend');
  
  // 准确率指标
  const accEl = document.getElementById('accuracy-value');
  accEl.textContent = data.backtest.accuracy_pct + '%';
  accEl.className = 'value ' + (data.backtest.accuracy_pct >= 87.49 ? 'green' : 'red');
  
  const impEl = document.getElementById('improvement-value');
  impEl.textContent = (data.backtest.improvement_pp > 0 ? '+' : '') + data.backtest.improvement_pp + 'pp';
  impEl.className = 'value ' + (data.backtest.improvement_pp > 0 ? 'positive' : 'negative');
  
  document.getElementById('perfect-value').textContent = data.backtest.perfect_count + '/' + data.backtest.total_periods;
  
  // 号码评分表
  const tbody = document.getElementById('scores-table');
  tbody.innerHTML = '';
  data.number_scores.forEach(ns => {
    let tag = '';
    if (ns.is_excluded_top2) tag = '<span class="tag-exclude">T2排除</span>';
    else if (ns.is_excluded_top5) tag = '<span class="tag-exclude">T5排除</span>';
    else if (ns.is_excluded_top10) tag = '<span class="tag-exclude">T10排除</span>';
    else if (ns.is_recommended) tag = '<span class="tag-recommend">关注</span>';
    
    const row = `<tr>
      <td class="num-cell">${ns.number.toString().padStart(2,'0')}</td>
      <td class="score-cell">${ns.composite_score.toFixed(4)}</td>
      <td>${ns.momentum_score.toFixed(3)}</td>
      <td>${ns.recency_score.toFixed(3)}</td>
      <td>${ns.cluster_score.toFixed(3)}</td>
      <td>${tag}</td>
    </tr>`;
    tbody.innerHTML += row;
  });
  
  // 月度图表
  if (data.monthly_accuracy && data.monthly_accuracy.length > 0) {
    renderChart('monthly-chart', {
      labels: data.monthly_accuracy.map(m => m.month),
      datasets: [{
        label: '引擎准确率',
        data: data.monthly_accuracy.map(m => m.accuracy_pct),
        borderColor: '#ffd700',
        backgroundColor: 'rgba(255,215,0,0.1)',
        fill: true,
      }, {
        label: '随机基线',
        data: data.monthly_accuracy.map(m => m.baseline_pct),
        borderColor: '#dc3545',
        borderDash: [5, 5],
        pointRadius: 0,
      }]
    });
  }
  
  // 每日图表
  if (data.daily_accuracy && data.daily_accuracy.length > 0) {
    renderChart('daily-chart', {
      labels: data.daily_accuracy.map((d, i) => '第' + (i+1) + '期'),
      datasets: [{
        label: '每日准确率',
        data: data.daily_accuracy.map(d => d.accuracy_pct),
        borderColor: '#28a745',
        backgroundColor: 'rgba(40,167,69,0.1)',
        fill: true,
      }, {
        label: '随机基线(87.18%)',
        data: data.daily_accuracy.map(() => 87.18),
        borderColor: '#dc3545',
        borderDash: [5, 5],
        pointRadius: 0,
      }]
    });
  }
  
  // 策略对比
  const strategyDiv = document.getElementById('strategy-list');
  if (data.backtest_history && data.backtest_history.length > 0) {
    const latest = data.backtest_history[data.backtest_history.length - 1];
    const strategies = latest.all_strategies;
    const sorted = Object.entries(strategies).sort((a,b) => b[1].accuracy_pct - a[1].accuracy_pct);
    
    strategyDiv.innerHTML = sorted.map(([name, d]) => {
      const delta = d.accuracy_pct - 87.18;
      const cls = delta > 0 ? 'positive' : 'negative';
      return `<div class="strategy-item">
        <span class="strategy-name">${name}</span>
        <span class="strategy-acc ${cls}">${d.accuracy_pct}%</span>
        <span class="strategy-delta ${cls}">(${delta > 0 ? '+' : ''}${delta.toFixed(2)}pp)</span>
      </div>`;
    }).join('');
  }
  
  // 最新开奖
  if (data.latest_draw) {
    const nums = data.latest_draw.numbers || [];
    renderBalls('latest-draw', nums.map(n => ({number: n, label: n.toString().padStart(2,'0')})), 'recommend');
    document.getElementById('latest-date').textContent = '开奖日期: ' + data.latest_draw.date;
  }
}

function renderBalls(containerId, items, type) {
  const container = document.getElementById(containerId);
  if (!container || !items) return;
  container.innerHTML = items.map(item => {
    const num = (item.number || parseInt(item.label)).toString().padStart(2, '0');
    const highlight = type === 'exclude' && items.indexOf(item) < 2 ? ' highlight' : '';
    return `<div class="ball ${type}${highlight}">${num}</div>`;
  }).join('');
}

function renderChart(canvasId, data) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  new Chart(ctx, {
    type: 'line',
    data: data,
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: {
          min: 85, max: 90,
          grid: { color: '#1e2a3a' },
          ticks: { color: '#8899aa' },
        },
        x: {
          grid: { color: '#1e2a3a' },
          ticks: { color: '#8899aa', maxTicksLimit: 8 },
        },
      },
      plugins: {
        legend: { labels: { color: '#e0e6f0' } },
      },
    },
  });
}

// 手动运行预测引擎
async function runAnalysis() {
  const btn = document.querySelector('.btn-run');
  btn.textContent = '⏳ 运行中...';
  btn.disabled = true;
  
  const fill = document.getElementById('progress-fill');
  fill.style.width = '30%';
  
  // 这里是前端触发，实际需要通过后端API调用
  // 在纯静态模式下，用户需要手动运行脚本后刷新页面
  fill.style.width = '50%';
  
  // 模拟提示
  setTimeout(() => {
    fill.style.width = '100%';
    btn.textContent = '✅ 请在终端运行脚本后刷新页面';
    setTimeout(() => {
      btn.textContent = '▶ 运行预测引擎';
      btn.disabled = false;
      fill.style.width = '0%';
    }, 3000);
  }, 2000);
}

// 初始加载
loadData();
</script>
</body>
</html>
