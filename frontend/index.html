<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今彩539 排除概率分析 Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0a0e17;
  color: #e0e6f0;
  min-height: 100vh;
}
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }
header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 20px 0; border-bottom: 1px solid #1e2a3a;
}
header h1 { font-size: 24px; color: #ffd700; }
header .meta { font-size: 14px; color: #8899aa; }
.card {
  background: #111927; border: 1px solid #1e2a3a; border-radius: 12px;
  padding: 20px; margin: 16px 0;
}
.card-title { font-size: 16px; color: #ffd700; margin-bottom: 12px; font-weight: 600; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }

/* 预测区域 */
.prediction-group { margin-bottom: 16px; }
.prediction-label { font-size: 13px; color: #8899aa; margin-bottom: 6px; }
.number-balls { display: flex; gap: 8px; flex-wrap: wrap; }
.ball {
  width: 44px; height: 44px; border-radius: 50%; display: flex;
  align-items: center; justify-content: center; font-size: 16px;
  font-weight: 700; cursor: default; position: relative;
}
.ball.exclude {
  background: linear-gradient(135deg, #dc3545, #c82333);
  color: white; border: 2px solid #ff4d5e;
}
.ball.recommend {
  background: linear-gradient(135deg, #28a745, #1e7e34);
  color: white; border: 2px solid #34ce57;
}
.ball.highlight {
  box-shadow: 0 0 12px rgba(255,215,0,0.5);
  animation: pulse 2s ease-in-out infinite;
}
.ball .prob-badge {
  position: absolute; bottom: -16px; left: 50%; transform: translateX(-50%);
  font-size: 10px; color: #ffd700; background: #0d1520;
  padding: 1px 4px; border-radius: 3px; white-space: nowrap;
}
@keyframes pulse { 0%,100%{box-shadow:0 0 8px rgba(255,215,0,0.3)} 50%{box-shadow:0 0 16px rgba(255,215,0,0.6)} }

/* 准确率指标 */
.metric-row { display: flex; gap: 20px; margin-bottom: 8px; }
.metric {
  flex: 1; text-align: center; padding: 12px;
  background: #0d1520; border-radius: 8px;
}
.metric .value { font-size: 28px; font-weight: 700; }
.metric .label { font-size: 12px; color: #8899aa; }
.metric .value.green { color: #28a745; }
.metric .value.gold { color: #ffd700; }
.metric .value.red { color: #dc3545; }

/* 表格 */
table { width: 100%; border-collapse: collapse; margin-top: 8px; }
th, td { padding: 8px 12px; text-align: center; }
th { font-size: 12px; color: #8899aa; background: #0d1520; }
td { font-size: 13px; border-bottom: 1px solid #1e2a3a; }
tr:hover { background: #1a2535; }
.num-cell { font-weight: 700; font-size: 15px; }
.score-cell { color: #ffd700; font-weight: 600; }
.tag-exclude { color: #dc3545; font-size: 11px; }
.tag-recommend { color: #28a745; font-size: 11px; }

/* 图表 */
canvas { max-width: 100%; }
.chart-container { position: relative; height: 200px; }

/* 按钮 */
.btn-group { display: flex; gap: 10px; margin: 10px 0; }
.btn {
  padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 700;
  cursor: pointer; border: none; transition: all 0.3s;
}
.btn-primary {
  background: linear-gradient(135deg, #ffd700, #e6c200);
  color: #0a0e17;
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(255,215,0,0.3); }
.btn-secondary {
  background: #1e2a3a; color: #e0e6f0;
  border: 1px solid #2a3a4a;
}
.btn-secondary:hover { background: #2a3a4a; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

/* 进度条 */
.progress-container { margin: 10px 0; }
.progress-bar {
  height: 6px; background: #1e2a3a; border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%; background: linear-gradient(90deg, #ffd700, #28a745);
  border-radius: 3px; transition: width 0.5s ease;
}
.progress-text {
  font-size: 13px; color: #8899aa; margin-top: 4px;
}

/* 策略对比 */
.strategy-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 0; border-bottom: 1px solid #1e2a3a;
}
.strategy-name { font-weight: 600; }
.strategy-acc { font-size: 16px; font-weight: 700; }
.strategy-delta { font-size: 13px; }
.positive { color: #28a745; }
.negative { color: #dc3545; }

/* Toast消息 */
.toast {
  position: fixed; bottom: 20px; right: 20px; padding: 12px 20px;
  background: #111927; border: 1px solid #ffd700; border-radius: 8px;
  color: #ffd700; font-size: 14px; z-index: 9999;
  transform: translateY(100px); opacity: 0;
  transition: all 0.3s;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.error { border-color: #dc3545; color: #dc3545; }
.toast.success { border-color: #28a745; color: #28a745; }

/* 响应式 */
@media (max-width: 768px) {
  .grid-2, .grid-3 { grid-template-columns: 1fr; }
  .ball { width: 36px; height: 36px; font-size: 14px; }
  .btn-group { flex-wrap: wrap; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>✦ 今彩539 排除概率分析</h1>
    <div class="meta">
      <div id="engine-info">引擎 v2.1 · 八维度评分</div>
      <div id="update-time">等待数据加载...</div>
    </div>
  </header>

  <!-- 操作按钮 -->
  <div class="btn-group">
    <button class="btn btn-primary" id="btn-run" onclick="runAnalysis()">▶ 运行预测引擎</button>
    <button class="btn btn-secondary" id="btn-update" onclick="updateData()">↻ 更新数据</button>
    <button class="btn btn-secondary" id="btn-backtest" onclick="backtestCompare()">🏆 策略对比</button>
  </div>

  <!-- 进度条 -->
  <div class="progress-container" id="progress-container" style="display:none">
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-text" id="progress-text">引擎运行中...</div>
  </div>

  <!-- 当日预测 -->
  <div class="card">
    <div class="card-title">🎯 当日预测分析结果</div>
    <div class="grid-3">
      <div class="prediction-group">
        <div class="prediction-label">TOP2 排除号（最高不中奖概率）</div>
        <div class="number-balls" id="top2-balls"><span style="color:#8899aa;font-size:14px">点击"运行预测引擎"获取</span></div>
      </div>
      <div class="prediction-group">
        <div class="prediction-label">TOP4 排除号</div>
        <div class="number-balls" id="top4-balls"><span style="color:#8899aa;font-size:14px">--</span></div>
      </div>
      <div class="prediction-group">
        <div class="prediction-label">TOP10 排除号</div>
        <div class="number-balls" id="top10-balls"><span style="color:#8899aa;font-size:14px">--</span></div>
      </div>
    </div>
    <div class="prediction-group" style="margin-top:16px">
      <div class="prediction-label">TOP5 关注号（最可能出现的号码）</div>
      <div class="number-balls" id="recommend-balls"><span style="color:#8899aa;font-size:14px">--</span></div>
    </div>
  </div>

  <!-- 准确率指标 -->
  <div class="card">
    <div class="card-title">📊 回测准确率指标</div>
    <div class="metric-row">
      <div class="metric">
        <div class="value gold" id="accuracy-value">--</div>
        <div class="label">引擎准确率</div>
      </div>
      <div class="metric">
        <div class="value" id="baseline-value">87.18%</div>
        <div class="label">随机基线</div>
      </div>
      <div class="metric">
        <div class="value" id="improvement-value">--</div>
        <div class="label">提升幅度</div>
      </div>
      <div class="metric">
        <div class="value" id="perfect-value">--</div>
        <div class="label">完美排除期</div>
      </div>
    </div>
  </div>

  <!-- 图表 -->
  <div class="grid-2">
    <div class="card">
      <div class="card-title">📈 近一年月度准确率变化</div>
      <div class="chart-container"><canvas id="monthly-chart"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">📉 近30期每日准确率变化</div>
      <div class="chart-container"><canvas id="daily-chart"></canvas></div>
    </div>
  </div>

  <!-- 号码评分详情 -->
  <div class="card">
    <div class="card-title">🔢 全号码评分详情（按不中奖概率排序）</div>
    <table>
      <thead><tr><th>号码</th><th>综合评分</th><th>动量</th><th>近期</th><th>聚类</th><th>分类</th></tr></thead>
      <tbody id="scores-table"><tr><td colspan="6" style="color:#8899aa">等待数据加载</td></tr></tbody>
    </table>
  </div>

  <!-- 策略对比 -->
  <div class="card" id="strategy-card" style="display:none">
    <div class="card-title">🏆 策略准确率对比</div>
    <div id="strategy-list"></div>
  </div>

  <!-- 最新开奖 -->
  <div class="card">
    <div class="card-title">🎲 最新开奖记录</div>
    <div class="number-balls" id="latest-draw"><span style="color:#8899aa">--</span></div>
    <div class="meta" id="latest-date" style="margin-top:8px">--</div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
const API_BASE = '';  // 同域，无需跨域前缀
let monthlyChart = null;
let dailyChart = null;
let pollTimer = null;

// ===== Toast =====
function showToast(msg, type='info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ===== 加载Dashboard数据 =====
async function loadData() {
  try {
    const resp = await fetch(API_BASE + '/api/dashboard');
    if (!resp.ok) throw new Error('无数据');
    const data = await resp.json();
    renderDashboard(data);
    document.getElementById('update-time').textContent = '更新: ' + data.generated_at.substring(0, 16);
    showToast('数据加载成功', 'success');
  } catch(e) {
    showToast('暂无数据，请运行预测引擎', 'info');
  }
}

// ===== 运行预测引擎 =====
async function runAnalysis() {
  const btn = document.getElementById('btn-run');
  btn.disabled = true;
  btn.textContent = '⏳ 运行中...';
  
  const progContainer = document.getElementById('progress-container');
  progContainer.style.display = 'block';
  document.getElementById('progress-fill').style.width = '10%';
  document.getElementById('progress-text').textContent = '引擎启动中...';
  
  try {
    const resp = await fetch(API_BASE + '/api/run-analysis', { method: 'POST' });
    const result = await resp.json();
    
    if (result.status === 'started') {
      showToast('引擎已启动，实时跟踪进度...', 'success');
      startPolling();
    } else if (result.status === 'running') {
      showToast('引擎已在运行中', 'info');
      startPolling();
    }
  } catch(e) {
    showToast('启动失败: ' + e.message, 'error');
    btn.disabled = false;
    btn.textContent = '▶ 运行预测引擎';
    progContainer.style.display = 'none';
  }
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(pollStatus, 1000);
}

async function pollStatus() {
  try {
    const resp = await fetch(API_BASE + '/api/status');
    const status = await resp.json();
    
    document.getElementById('progress-fill').style.width = status.progress + '%';
    document.getElementById('progress-text').textContent = status.message;
    
    if (!status.running && status.progress >= 100) {
      clearInterval(pollTimer);
      pollTimer = null;
      
      // 重新加载Dashboard数据
      const dataResp = await fetch(API_BASE + '/api/dashboard');
      if (dataResp.ok) {
        const data = await dataResp.json();
        renderDashboard(data);
        showToast('分析完成！准确率 ' + data.backtest.accuracy_pct + '%', 'success');
      }
      
      const btn = document.getElementById('btn-run');
      btn.disabled = false;
      btn.textContent = '▶ 运行预测引擎';
      
      document.getElementById('progress-container').style.display = 'none';
    } else if (!status.running && status.progress === 0) {
      clearInterval(pollTimer);
      pollTimer = null;
      showToast('分析失败，请重试', 'error');
      
      const btn = document.getElementById('btn-run');
      btn.disabled = false;
      btn.textContent = '▶ 运行预测引擎';
      document.getElementById('progress-container').style.display = 'none';
    }
  } catch(e) {
    // 网络错误，继续轮询
  }
}

// ===== 更新数据 =====
async function updateData() {
  const btn = document.getElementById('btn-update');
  btn.disabled = true;
  btn.textContent = '⏳ 更新中...';
  
  try {
    const resp = await fetch(API_BASE + '/api/update-data', { method: 'POST' });
    const result = await resp.json();
    
    if (result.status === 'success') {
      showToast(`数据更新成功: ${result.total_draws}期, 最新${result.latest_date}`, 'success');
      // 更新最新开奖显示
      if (result.latest_numbers) {
        renderBalls('latest-draw', result.latest_numbers.map(n => ({number:n, label:n.toString().padStart(2,'0')})), 'recommend');
        document.getElementById('latest-date').textContent = '开奖日期: ' + result.latest_date;
      }
    } else {
      showToast('更新失败: ' + result.message, 'error');
    }
  } catch(e) {
    showToast('网络错误: ' + e.message, 'error');
  }
  
  btn.disabled = false;
  btn.textContent = '↻ 更新数据';
}

// ===== 策略对比 =====
async function backtestCompare() {
  const btn = document.getElementById('btn-backtest');
  btn.disabled = true;
  btn.textContent = '⏳ 对比中...';
  
  try {
    const resp = await fetch(API_BASE + '/api/backtest-compare', { method: 'POST' });
    const result = await resp.json();
    
    if (result.status === 'success') {
      const strategyDiv = document.getElementById('strategy-list');
      const sorted = Object.entries(result.strategies).sort((a,b) => b[1].accuracy_pct - a[1].accuracy_pct);
      
      strategyDiv.innerHTML = sorted.map(([name, d]) => {
        const delta = d.accuracy_pct - 87.18;
        const cls = delta > 0 ? 'positive' : 'negative';
        return `<div class="strategy-item">
          <span class="strategy-name">${name}</span>
          <span class="strategy-acc ${cls}">${d.accuracy_pct}%</span>
          <span class="strategy-delta ${cls}">(${delta > 0 ? '+' : ''}${delta.toFixed(2)}pp)</span>
          <span style="color:#8899aa;font-size:12px">完美${d.perfect_count}/${d.total_periods}期</span>
        </div>`;
      }).join('');
      
      document.getElementById('strategy-card').style.display = 'block';
      showToast('策略对比完成', 'success');
    }
  } catch(e) {
    showToast('对比失败: ' + e.message, 'error');
  }
  
  btn.disabled = false;
  btn.textContent = '🏆 策略对比';
}

// ===== 渲染 =====
function renderDashboard(data) {
  renderBalls('top2-balls', data.prediction.top2, 'exclude', true);
  renderBalls('top4-balls', data.prediction.top4, 'exclude');
  renderBalls('top5-balls', data.prediction.top5, 'exclude');
  renderBalls('top10-balls', data.prediction.top10, 'exclude');
  renderBalls('recommend-balls', data.prediction.recommended, 'recommend');
  
  // 准确率
  const accEl = document.getElementById('accuracy-value');
  accEl.textContent = data.backtest.accuracy_pct + '%';
  accEl.className = 'value ' + (data.backtest.accuracy_pct >= 87.49 ? 'green' : 'gold');
  
  const impEl = document.getElementById('improvement-value');
  impEl.textContent = (data.backtest.improvement_pp > 0 ? '+' : '') + data.backtest.improvement_pp + 'pp';
  impEl.className = 'value ' + (data.backtest.improvement_pp > 0 ? 'positive' : 'negative');
  
  document.getElementById('perfect-value').textContent = data.backtest.perfect_count + '/' + data.backtest.total_periods;
  
  // 号码评分表
  const tbody = document.getElementById('scores-table');
  tbody.innerHTML = '';
  data.number_scores.forEach(ns => {
    let tag = '';
    if (ns.is_excluded_top2) tag = '<span class="tag-exclude">T2</span>';
    else if (ns.is_excluded_top5) tag = '<span class="tag-exclude">T5</span>';
    else if (ns.is_excluded_top10) tag = '<span class="tag-exclude">T10</span>';
    else if (ns.is_recommended) tag = '<span class="tag-recommend">关注</span>';
    
    tbody.innerHTML += `<tr>
      <td class="num-cell">${ns.number.toString().padStart(2,'0')}</td>
      <td class="score-cell">${ns.composite_score.toFixed(4)}</td>
      <td>${ns.momentum_score.toFixed(3)}</td>
      <td>${ns.recency_score.toFixed(3)}</td>
      <td>${ns.cluster_score.toFixed(3)}</td>
      <td>${tag}</td>
    </tr>`;
  });
  
  // 最新开奖
  if (data.latest_draw && data.latest_draw.numbers) {
    const nums = data.latest_draw.numbers;
    renderBalls('latest-draw', nums.map(n => ({number:n, label:n.toString().padStart(2,'0')})), 'recommend');
    document.getElementById('latest-date').textContent = '开奖日期: ' + data.latest_draw.date;
  }
}

function renderBalls(containerId, items, type, highlightFirst2=false) {
  const container = document.getElementById(containerId);
  if (!container || !items) return;
  container.innerHTML = items.map((item, idx) => {
    const num = (item.number || parseInt(item.label)).toString().padStart(2, '0');
    const cls = type === 'exclude' && highlightFirst2 && idx < 2 ? ' highlight' : '';
    return `<div class="ball ${type}${cls}">${num}</div>`;
  }).join('');
}

function renderChart(canvasId, chartData) {
  const ctx = document.getElementById(canvasId).getContext('2d');
  if (canvasId === 'monthly-chart' && monthlyChart) monthlyChart.destroy();
  if (canvasId === 'daily-chart' && dailyChart) dailyChart.destroy();
  
  const chart = new Chart(ctx, {
    type: 'line',
    data: chartData,
    options: {
      responsive: true, maintainAspectRatio: false,
      scales: {
        y: { min: 85, max: 90, grid: { color: '#1e2a3a' }, ticks: { color: '#8899aa' } },
        x: { grid: { color: '#1e2a3a' }, ticks: { color: '#8899aa', maxTicksLimit: 8 } },
      },
      plugins: { legend: { labels: { color: '#e0e6f0' } } },
    },
  });
  
  if (canvasId === 'monthly-chart') monthlyChart = chart;
  if (canvasId === 'daily-chart') dailyChart = chart;
}

// ===== 初始加载 =====
loadData();
</script>
</body>
</html>
