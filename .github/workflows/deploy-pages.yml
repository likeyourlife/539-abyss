name: Deploy 539 Dashboard to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # 手动触发

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          pip install httpx beautifulsoup4 lxml

      - name: Generate dashboard data
        run: |
          python3 scripts/generate_dashboard_data.py

      - name: Copy data to frontend
        run: |
          cp reports/dashboard_data.json frontend/dashboard_data.json
          cp data/backtest_history.json frontend/backtest_history.json 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
